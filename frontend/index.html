<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Horison ESG — Private Markets Scoring</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
header{background:#0f172a;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:#f59e0b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#0f172a}
.logo-text{margin-left:10px}
.logo-name{font-size:15px;font-weight:800;color:#f8fafc;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:#475569;letter-spacing:1.2px;text-transform:uppercase}
.api-status{display:flex;align-items:center;gap:7px;font-size:12px;color:#64748b}
.status-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0}
.status-dot.ok{background:#22c55e}.status-dot.err{background:#ef4444}
.body{display:flex;flex:1;overflow:hidden}
/* Sidebar */
aside{width:252px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-label{padding:14px 16px 6px;font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase}
.company-list{flex:1;overflow-y:auto;padding:0 8px}
.co-card{padding:10px 12px;border-radius:10px;margin-bottom:5px;cursor:pointer;border:1.5px solid transparent;background:#f8fafc;transition:all .15s}
.co-card:hover{background:#f0f9ff;border-color:#bae6fd}
.co-card.active{background:#eff6ff;border-color:#3b82f6}
.co-name{font-weight:700;font-size:13px;color:#1e293b;margin-bottom:2px}
.co-tag{font-size:10px;color:#94a3b8;margin-bottom:5px}
.co-score{display:flex;align-items:center;gap:7px}
.score-num{font-size:21px;font-weight:800;line-height:1}
.score-grade{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700}
.alert-badge{font-size:10px;background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:999px;font-weight:700}
.sidebar-foot{padding:10px;border-top:1px solid #f1f5f9}
.btn-score-all{width:100%;padding:9px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.btn-score-all:hover{background:#1e293b}
.legend{margin-top:10px;padding:10px 12px;background:#f8fafc;border-radius:8px}
.legend-title{font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.legend-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
/* Main */
main{flex:1;overflow-y:auto;padding:22px;background:#f1f5f9}
.empty-state{height:80%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center}
.empty-icon{font-size:52px;margin-bottom:4px}
.empty-title{font-size:20px;font-weight:800;color:#334155}
.empty-sub{font-size:13px;color:#94a3b8;max-width:360px;line-height:1.7}
.api-warn{margin-top:14px;padding:14px 20px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;font-size:13px;color:#dc2626;max-width:440px;line-height:1.7}
code{font-family:monospace;font-size:12px;display:block;margin-top:6px;background:#fff1f1;padding:4px 8px;border-radius:4px}
/* Cards */
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
/* Tabs */
.tabs{display:flex;gap:3px;background:#fff;padding:4px;border-radius:10px;border:1px solid #e2e8f0;width:fit-content;margin-bottom:18px}
.tab{padding:6px 18px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;text-transform:capitalize;background:transparent;color:#64748b;transition:all .15s}
.tab.active{background:#0f172a;color:#fff}
/* Page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-title{font-size:20px;font-weight:800;color:#0f172a}
.page-sub{font-size:12px;color:#94a3b8;margin-top:2px}
.btn-rescore{padding:7px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;color:#475569;cursor:pointer}
/* Gauge row */
.gauge-row{padding:24px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:28px;align-items:center}
.gauge-meta{margin-left:auto;min-width:150px}
.meta-row{display:flex;justify-content:space-between;gap:16px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.meta-key{color:#94a3b8}.meta-val{font-weight:700;color:#334155}
/* Alerts */
.alerts{margin-bottom:18px}
.alert-header{font-size:11px;font-weight:800;color:#b45309;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.alert-item{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px;line-height:1.5}
.alert-metric{font-weight:700;color:#92400e;margin-right:8px}
.alert-claim{color:#78350f}
.alert-arrow{color:#94a3b8;margin:0 8px}
.alert-counter{color:#dc2626}
.alert-div{background:#fee2e2;color:#991b1b;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-left:10px}
/* Pillar grid */
.pillar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pillar-card{padding:20px}
.pillar-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pillar-label-sm{font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:2px;text-transform:uppercase}
.pillar-name{font-size:17px;font-weight:700;color:#1e293b}
.pillar-score{font-size:30px;font-weight:800;line-height:1}
.pillar-conf{font-size:10px;color:#94a3b8;margin-top:2px}
.gw-warn{background:#fef3c7;border:1px solid #fbbf24;border-radius:6px;padding:6px 10px;font-size:12px;color:#92400e;font-weight:600;margin-bottom:12px}
.bar-legend{display:flex;gap:12px;margin-top:8px;font-size:10px;color:#94a3b8}
.bar-swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
/* Overview grid */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.compliance-card{padding:20px}
.compliance-title{font-size:11px;font-weight:700;color:#475569;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc}
.check-label{font-size:13px;font-weight:600;color:#334155}
.check-desc{font-size:11px;color:#94a3b8;margin-top:1px}
/* Metrics table */
.table-card{padding:20px}
.table-title{font-size:11px;font-weight:700;color:#475569;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 10px;text-align:left;color:#94a3b8;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #f1f5f9;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f8fafc}
.pill{padding:1px 8px;border-radius:999px;font-size:11px;font-weight:700}
.bar-mini{width:48px;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.bar-fill{height:100%;border-radius:3px}
/* Audit */
.audit-card{padding:20px}
.audit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.audit-cell{background:#f8fafc;border-radius:8px;padding:10px 14px}
.audit-key{font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.audit-val{font-weight:700;color:#334155;font-family:monospace;font-size:12px;word-break:break-all}
.audit-notice{padding:12px 14px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;font-size:13px;color:#15803d;line-height:1.6}
/* Radar (SVG) */
.radar-card{padding:20px}
.radar-title{font-size:11px;font-weight:700;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
/* Spinner */
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.loading-icon{font-size:36px}
.loading-text{color:#64748b;font-size:14px}
/* Fade */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>
<body>
<div class="app" id="app"></div>

// ── SVG gauge ──────────────────────────────────────────────────────────
function svgGauge(score, label, size=140){
  const r=size*.38, cx=size/2, cy=size*.54;
  const startA=210, endA=-30, range=startA-endA;
  const pct=Math.max(0,Math.min(1,score/100));
  const toRad=d=>d*Math.PI/180;
  function arcPoint(cx,cy,r,deg){return[cx+r*Math.cos(toRad(deg)),cy-r*Math.sin(toRad(deg))]}
  function arc(cx,cy,r,a1,a2,laf){
    const[x1,y1]=arcPoint(cx,cy,r,a1);
    const[x2,y2]=arcPoint(cx,cy,r,a2);
    return`M${x1},${y1} A${r},${r},0,${laf},0,${x2},${y2}`;
  }
  const bgLaf=1, fgLaf=pct>0.5?1:0;
  const fgEnd=startA-pct*range;
  const col=sc(score), grade=sg(score);
  const sw=size*.09;
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <svg width="${size}" height="${size*.72}" viewBox="0 0 ${size} ${size*.72}">
      <path d="${arc(cx,cy,r,endA,startA,1)}" fill="none" stroke="#e2e8f0" stroke-width="${sw}" stroke-linecap="round"/>
      ${pct>0?`<path d="${arc(cx,cy,r,fgEnd,startA,fgLaf)}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`:``}
      <text x="${cx}" y="${cy+2}" text-anchor="middle" font-size="${size*.18}" font-weight="800" fill="#1e293b" font-family="system-ui">${score.toFixed(0)}</text>
      <text x="${cx}" y="${cy+size*.14}" text-anchor="middle" font-size="${size*.085}" font-weight="800" fill="${col}" font-family="system-ui">${grade}</text>
    </svg>
    <span style="font-size:11px;font-weight:600;color:#64748b;text-align:center;line-height:1.3">${esc(label)}</span>
  </div>`;
}

// ── SVG bar chart ──────────────────────────────────────────────────────
function svgBars(data, pillarColor){
  if(!data.length) return '';
  const W=260,barH=14,gap=6,padL=36,padR=12;
  const H=data.length*(barH+gap)+4;
  const barsHTML=data.map((d,i)=>{
    const y=i*(barH+gap)+2;
    const bw=Math.max(2,Math.round((d.score/100)*(W-padL-padR)));
    const col=d.outcome?pillarColor:'#cbd5e1';
    return`<text x="${padL-4}" y="${y+barH*.75}" text-anchor="end" font-size="9" fill="#94a3b8" font-family="system-ui">${esc(d.name)}</text>
      <rect x="${padL}" y="${y}" width="${W-padL-padR}" height="${barH}" rx="3" fill="#f1f5f9"/>
      <rect x="${padL}" y="${y}" width="${bw}" height="${barH}" rx="3" fill="${col}"/>
      <text x="${padL+bw+3}" y="${y+barH*.76}" font-size="9" fill="#64748b" font-family="system-ui">${d.score}</text>`;
  }).join('');
  return`<svg width="${W}" height="${H}" style="overflow:visible">${barsHTML}</svg>`;
}

// ── SVG radar ──────────────────────────────────────────────────────────
function svgRadar(points){
  if(!points.length) return '';
  const cx=140,cy=130,R=100,n=points.length;
  const toRad=d=>d*Math.PI/180;
  function pt(val,i){
    const a=toRad(-90+(360/n)*i);
    const r=(val/100)*R;
    return[cx+r*Math.cos(a),cy+r*Math.sin(a)];
  }
  function axPt(i,scale=1){
    const a=toRad(-90+(360/n)*i);
    return[cx+R*scale*Math.cos(a),cy+R*scale*Math.sin(a)];
  }
  const gridLines=[.25,.5,.75,1].map(s=>
    `<polygon points="${Array.from({length:n},(_,i)=>axPt(i,s).join(',')).join(' ')}" fill="none" stroke="#e2e8f0" stroke-width="1"/>`
  ).join('');
  const axes=Array.from({length:n},(_,i)=>{
    const[x,y]=axPt(i);
    return`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>`;
  }).join('');
  const poly=points.map(({val},i)=>pt(val,i).join(',')).join(' ');
  const labels=points.map(({name},i)=>{
    const[x,y]=axPt(i,1.18);
    return`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#64748b" font-family="system-ui">${esc(name)}</text>`;
  }).join('');
  return`<svg width="280" height="270" viewBox="0 0 280 270">
    ${gridLines}${axes}
    <polygon points="${poly}" fill="#6366f120" stroke="#6366f1" stroke-width="1.5"/>
    ${labels}
  </svg>`;
}

function drawSemanticGraph(data, svg){
  const W = svg.clientWidth||420, H = 340;
  const CX=W/2, CY=H/2;
  const nodes = data.nodes||[], edges = data.edges||[];
  if(!nodes.length){ svg.innerHTML='<text x="50%" y="50%" fill="#475569" text-anchor="middle" font-size="13" font-family="system-ui">No relationships found</text>'; return; }

  // Layout: centre node in middle, others in circle around
  const centre = nodes.find(n=>n.group==='centre');
  const others  = nodes.filter(n=>n.group!=='centre');
  const r = Math.min(W,H)*.32;
  const positioned = [
    centre ? {...centre, x:CX, y:CY} : null,
    ...others.map((n,i)=>({
      ...n,
      x: CX + r*Math.cos(-Math.PI/2 + (2*Math.PI/others.length)*i),
      y: CY + r*Math.sin(-Math.PI/2 + (2*Math.PI/others.length)*i),
    }))
  ].filter(Boolean);
  const byId = Object.fromEntries(positioned.map(n=>[n.id,n]));

  svg.innerHTML='<defs><marker id="sarr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#475569"/></marker></defs>';

  // Edges
  edges.forEach(e=>{
    const src=byId[e.source], tgt=byId[e.target];
    if(!src||!tgt) return;
    const col = REL_COLOR[e.rel]||'#475569';
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',src.x); line.setAttribute('y1',src.y);
    line.setAttribute('x2',tgt.x); line.setAttribute('y2',tgt.y);
    line.setAttribute('stroke',col); line.setAttribute('stroke-width','1.5');
    line.setAttribute('stroke-opacity','0.6'); line.setAttribute('marker-end','url(#sarr)');
    svg.appendChild(line);
    // edge label
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',(src.x+tgt.x)/2); lbl.setAttribute('y',(src.y+tgt.y)/2-4);
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('font-size','8');
    lbl.setAttribute('fill',col); lbl.setAttribute('font-family','system-ui');
    lbl.setAttribute('font-weight','600');
    lbl.textContent=(REL_LABEL[e.rel]||e.rel).split(' ').slice(0,2).join('\n');
    svg.appendChild(lbl);
  });

  // Nodes
  positioned.forEach(n=>{
    const isCentre = n.group==='centre';
    const col = REL_COLOR[n.group]||'#6366f1';
    const radius = isCentre ? 26 : 20;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';

    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',n.x); circle.setAttribute('cy',n.y); circle.setAttribute('r',radius);
    circle.setAttribute('fill', isCentre?'#6366f1':col+'33');
    circle.setAttribute('stroke', isCentre?'#4f46e5':col); circle.setAttribute('stroke-width',isCentre?'2':'1.5');
    g.appendChild(circle);

    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',n.x); text.setAttribute('y',n.y);
    text.setAttribute('text-anchor','middle'); text.setAttribute('dominant-baseline','middle');
    text.setAttribute('font-size',isCentre?'11':'10');
    text.setAttribute('font-weight','700'); text.setAttribute('fill',isCentre?'#fff':'#f8fafc');
    text.setAttribute('font-family','system-ui');
    text.textContent=n.label;
    g.appendChild(text);

    // Tags below (centre only)
    if(isCentre && n.tags?.length){
      n.tags.slice(0,3).forEach((tag,i)=>{
        const t=document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',n.x); t.setAttribute('y',n.y+radius+12+i*10);
        t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','8');
        t.setAttribute('fill','#94a3b8'); t.setAttribute('font-family','system-ui');
        t.textContent=tag;
        svg.appendChild(t);
      });
    }
    svg.appendChild(g);
  });
}

function renderTrailFromGraph(graph, filterMetricId=null){
  // Group evidence nodes by the metric score they back
  const metricNodes  = graph.nodes.filter(n=>n.label==='MetricScore');
  const evidenceNodes= graph.nodes.filter(n=>n.label==='EvidenceItem');
  const edges        = graph.edges;

  const filtered = filterMetricId
    ? metricNodes.filter(m=>m.metric_id===filterMetricId)
    : metricNodes.filter(m=>m.score>0);

  if(!filtered.length) return '<div style="color:#94a3b8;font-size:13px">No metric scores with evidence found.</div>';

  return filtered.map(ms=>{
    const evIds  = edges.filter(e=>e.source===ms.id&&e.rel==='BACKED_BY').map(e=>e.target);
    const evList = evidenceNodes.filter(e=>evIds.includes(e.id));
    const pillarCol = {E:'#22c55e',S:'#3b82f6',G:'#8b5cf6'}[ms.pillar]||'#94a3b8';
    return `
      <div style="border:1px solid #f1f5f9;border-radius:10px;margin-bottom:10px;overflow:hidden">
        <div style="padding:10px 14px;background:#f8fafc;display:flex;align-items:center;gap:10px">
          <span style="background:${pillarCol}18;color:${pillarCol};padding:2px 8px;
            border-radius:999px;font-size:11px;font-weight:700">${ms.pillar}</span>
          <span style="font-weight:700;color:#334155;font-size:13px">${ms.metric_id}</span>
          <span style="color:#64748b;font-size:12px">— ${ms.metric_name||''}</span>
          <span style="margin-left:auto;font-size:18px;font-weight:800;color:${sc(ms.score)}">${ms.score}</span>
          ${ms.outcome_based?'<span style="font-size:10px;background:#f0fdf4;color:#16a34a;padding:1px 7px;border-radius:999px;font-weight:600">Outcome</span>':''}
        </div>
        ${evList.length===0
          ? '<div style="padding:10px 14px;font-size:12px;color:#cbd5e1;font-style:italic">No direct evidence linked</div>'
          : evList.map(ev=>`
          <div style="padding:9px 14px;border-top:1px solid #f8fafc;display:flex;align-items:flex-start;gap:10px;font-size:12px">
            <div style="width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0;
              background:${EV_SOURCE_COLOR[ev.source]||'#94a3b8'}"></div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span style="font-weight:600;color:#334155;text-transform:capitalize">${ev.source||''}</span>
                <span style="background:#f1f5f9;color:#64748b;padding:1px 7px;border-radius:999px;
                  font-size:10px;text-transform:capitalize">${ev.type||''}</span>
                ${ev.verified
                  ? '<span style="background:#f0fdf4;color:#16a34a;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600">✓ Verified</span>'
                  : '<span style="background:#fef3c7;color:#92400e;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600">Self-reported</span>'}
                <span style="margin-left:auto;font-weight:700;color:#334155">
                  Norm: ${ev.value!=null?ev.value+'%':'—'}
                </span>
                <span style="color:#94a3b8">conf. ${Math.round((ev.confidence||0)*100)}%</span>
              </div>
            </div>
          </div>`).join('')}
      </div>`;
  }).join('');
}

function initForceGraph(graphData){
  const svg = document.getElementById('prov-svg');
  if(!svg||!graphData.nodes.length) return;

  const W = svg.clientWidth||800, H=480;
  const CX=W/2, CY=H/2;

  // Simple force-directed layout using iterative repulsion + spring forces
  const nodes = graphData.nodes.map((n,i)=>({
    ...n,
    x: CX + (Math.random()-.5)*300,
    y: CY + (Math.random()-.5)*200,
    vx:0, vy:0,
  }));
  const nodeById = Object.fromEntries(nodes.map(n=>[n.id,n]));
  const edges = graphData.edges.map(e=>({
    ...e,
    source: nodeById[e.source],
    target: nodeById[e.target],
  })).filter(e=>e.source&&e.target);

  // Assign fixed positions by label tier (hierarchical layout)
  const tiers = {Company:0, ESGScore:1, PillarScore:2, MetricScore:3, EvidenceItem:4};
  const tierCounts = {};
  nodes.forEach(n=>{
    const t = tiers[n.label]??3;
    tierCounts[t]=(tierCounts[t]||0)+1;
  });
  const tierIdx = {};
  nodes.forEach(n=>{
    const t=tiers[n.label]??3;
    tierIdx[t]=(tierIdx[t]||0);
    const count=tierCounts[t];
    const xOffset = count===1?0:((tierIdx[t]/(count-1))-.5)*(W*.8);
    n.x = CX + xOffset;
    n.y = 60 + t*(H-80)/4;
    tierIdx[t]++;
    n.fx = n.x; // fixed horizontal, allow small vertical drift
  });

  // Run a few iterations of force simulation
  for(let iter=0;iter<80;iter++){
    // Repulsion between nodes at same tier
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        if((tiers[a.label]??3)!==(tiers[b.label]??3)) continue;
        const dx=b.x-a.x, dy=b.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        const force=1200/(dist*dist);
        const fx=dx/dist*force, fy=dy/dist*force;
        a.x-=fx*.5; b.x+=fx*.5;
        a.y-=fy*.3; b.y+=fy*.3;
      }
    }
    // Spring attraction along edges
    edges.forEach(e=>{
      const dx=e.target.x-e.source.x, dy=e.target.y-e.source.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const ideal=100;
      const force=(dist-ideal)*0.02;
      const fx=dx/dist*force, fy=dy/dist*force;
      e.source.x+=fx; e.target.x-=fx;
    });
    // Re-pin horizontal tiers
    nodes.forEach(n=>{n.x=Math.max(30,Math.min(W-30,n.x));});
  }

  // Render
  function nodeLabel(n){
    if(n.label==='Company') return n.name||n.id.slice(0,8);
    if(n.label==='ESGScore') return `ESG\n${n.score}`;
    if(n.label==='PillarScore') return `${n.pillar}\n${n.score}`;
    if(n.label==='MetricScore') return `${n.metric_id}\n${n.score}`;
    if(n.label==='EvidenceItem') return `${(n.source||'').replace('_','\n')}\n${n.value!=null?n.value+'%':'?'}`;
    return n.id.slice(0,8);
  }

  function evNodeFill(n){
    if(n.label!=='EvidenceItem') return NODE_META[n.label]?.color||'#94a3b8';
    return EV_SOURCE_COLOR[n.source]||'#94a3b8';
  }

  let selected = null;

  function draw(){
    svg.innerHTML='';
    // Defs: arrow marker
    svg.innerHTML=`<defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#334155" opacity=".6"/>
      </marker>
    </defs>`;

    // Edges
    edges.forEach(e=>{
      const src=e.source,tgt=e.target;
      const col = selected&&(selected.id===src.id||selected.id===tgt.id)?'#f59e0b':'#334155';
      const op  = selected&&(selected.id!==src.id&&selected.id!==tgt.id)?'0.15':'0.55';
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',src.x); line.setAttribute('y1',src.y);
      line.setAttribute('x2',tgt.x); line.setAttribute('y2',tgt.y);
      line.setAttribute('stroke',col);
      line.setAttribute('stroke-width',selected&&(selected.id===src.id||selected.id===tgt.id)?'2':'1.5');
      line.setAttribute('stroke-opacity',op);
      line.setAttribute('marker-end','url(#arr)');
      svg.appendChild(line);
      // Edge label
      if(e.rel==='BACKED_BY'&&e.contribution!=null){
        const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
        lbl.setAttribute('x',(src.x+tgt.x)/2); lbl.setAttribute('y',(src.y+tgt.y)/2-3);
        lbl.setAttribute('text-anchor','middle');
        lbl.setAttribute('font-size','8');
        lbl.setAttribute('fill','#64748b');
        lbl.setAttribute('font-family','system-ui');
        lbl.textContent=(e.contribution*100).toFixed(0)+'%';
        svg.appendChild(lbl);
      }
    });

    // Nodes
    nodes.forEach(n=>{
      const meta = NODE_META[n.label]||{color:'#64748b',r:14,textColor:'#fff'};
      const fill = evNodeFill(n);
      const isSel= selected&&selected.id===n.id;
      const isDim= selected&&selected.id!==n.id&&
                   !edges.some(e=>e.source.id===selected.id&&e.target.id===n.id||
                                  e.target.id===selected.id&&e.source.id===n.id);
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.style.cursor='pointer';
      g.style.opacity=isDim?'0.25':'1';
      g.style.transition='opacity .2s';

      // Outer glow if selected
      if(isSel){
        const glow=document.createElementNS('http://www.w3.org/2000/svg','circle');
        glow.setAttribute('cx',n.x); glow.setAttribute('cy',n.y);
        glow.setAttribute('r',meta.r+7);
        glow.setAttribute('fill','none');
        glow.setAttribute('stroke','#f59e0b');
        glow.setAttribute('stroke-width','2');
        glow.setAttribute('stroke-opacity','0.8');
        g.appendChild(glow);
      }

      const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',n.x); circle.setAttribute('cy',n.y);
      circle.setAttribute('r',meta.r);
      circle.setAttribute('fill',fill);
      circle.setAttribute('stroke', n.verified===false?'#f59e0b': n.verified===true?'#22c55e':'#475569');
      circle.setAttribute('stroke-width', n.label==='EvidenceItem'?'2':'1');
      g.appendChild(circle);

      // Label lines
      const lines = nodeLabel(n).split('\n');
      lines.forEach((line,i)=>{
        const t=document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',n.x); t.setAttribute('y', n.y+(i-(lines.length-1)/2)*11+1);
        t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
        t.setAttribute('font-size',n.label==='Company'?'9':'8');
        t.setAttribute('font-weight','700'); t.setAttribute('fill',meta.textColor);
        t.setAttribute('font-family','system-ui');
        t.textContent=line;
        g.appendChild(t);
      });

      // Verified badge on EvidenceItem
      if(n.label==='EvidenceItem'){
        const badge=document.createElementNS('http://www.w3.org/2000/svg','text');
        badge.setAttribute('x',n.x+meta.r-2); badge.setAttribute('y',n.y-meta.r+2);
        badge.setAttribute('font-size','9'); badge.setAttribute('text-anchor','middle');
        badge.textContent=n.verified?'✓':'!';
        badge.setAttribute('fill',n.verified?'#16a34a':'#f59e0b');
        badge.setAttribute('font-weight','900');
        g.appendChild(badge);
      }

      // Click to select / tooltip
      g.addEventListener('click',()=>{
        selected=(selected&&selected.id===n.id)?null:n;
        draw();
        showTooltip(n);
      });
      g.addEventListener('mouseover',e=>showTooltip(n,e));
      g.addEventListener('mouseout',hideTooltip);

      svg.appendChild(g);
    });
  }

  const tooltip=document.getElementById('prov-tooltip');
  function showTooltip(n, event){
    if(!tooltip) return;
    let html='';
    if(n.label==='Company') html=`<b>${n.name||n.id}</b><br/>Sector: ${n.sector||'—'}`;
    else if(n.label==='ESGScore') html=`<b>ESG Score</b><br/>Composite: <b>${n.score}</b>`;
    else if(n.label==='PillarScore') html=`<b>${n.pillar} Pillar</b><br/>Score: <b>${n.score}</b>`;
    else if(n.label==='MetricScore') html=`<b>${n.metric_id}</b><br/>Score: <b>${n.score}</b><br/>${n.outcome_based?'✅ Outcome-based':'📋 Policy/disclosure'}`;
    else if(n.label==='EvidenceItem'){
      html=`<b>${(n.source||'').replace(/_/g,' ')}</b><br/>Type: ${n.type||'—'}<br/>Value: ${n.value!=null?n.value+'%':'—'}<br/>Confidence: ${Math.round((n.confidence||0)*100)}%<br/>${n.verified?'✅ Verified':'⚠ Self-reported'}`;
    }
    tooltip.innerHTML=html;
    tooltip.style.display='block';
    if(event){
      const rect=svg.getBoundingClientRect();
      tooltip.style.left=(event.clientX-rect.left+12)+'px';
      tooltip.style.top=(event.clientY-rect.top+12)+'px';
    }
  }
  function hideTooltip(){ if(tooltip) tooltip.style.display='none'; }

  draw();

  // Make SVG responsive
  const ro=new ResizeObserver(()=>{
    const newW=svg.clientWidth||800;
    nodes.forEach(n=>{n.x=n.x*(newW/W);});
    draw();
  });
  ro.observe(svg);
}

// ── render ─────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=
    renderSidebar() + renderMain() + '</div>';
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll('.co-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const co=COMPANIES.find(c=>c.id===el.dataset.id);
      if(co) scoreCompany(co);
    });
  });
  const btnAll=document.getElementById('btnScoreAll');
  if(btnAll) btnAll.addEventListener('click',()=>{
    COMPANIES.forEach(co=>{if(!state.results[co.id]&&!state.loading[co.id]) scoreCompany(co);});
  });
  document.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click',()=>setState({tab:el.dataset.tab}));
  });
  document.querySelectorAll('[data-rescore]').forEach(el=>{
    el.addEventListener('click',()=>{
      const co=COMPANIES.find(c=>c.id===el.dataset.rescore);
      if(co) scoreCompany(co);
    });
  });
}

// ── boot ───────────────────────────────────────────────────────────────
render();
checkApi();
</script>
