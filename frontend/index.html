<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Horison ESG — Private Markets Scoring</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
header{background:#0f172a;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:#f59e0b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#0f172a}
.logo-text{margin-left:10px}
.logo-name{font-size:15px;font-weight:800;color:#f8fafc;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:#475569;letter-spacing:1.2px;text-transform:uppercase}
.api-status{display:flex;align-items:center;gap:7px;font-size:12px;color:#64748b}
.status-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0}
.status-dot.ok{background:#22c55e}.status-dot.err{background:#ef4444}
.body{display:flex;flex:1;overflow:hidden}
/* Sidebar */
aside{width:252px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-label{padding:14px 16px 6px;font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase}
.company-list{flex:1;overflow-y:auto;padding:0 8px}
.co-card{padding:10px 12px;border-radius:10px;margin-bottom:5px;cursor:pointer;border:1.5px solid transparent;background:#f8fafc;transition:all .15s}
.co-card:hover{background:#f0f9ff;border-color:#bae6fd}
.co-card.active{background:#eff6ff;border-color:#3b82f6}
.co-name{font-weight:700;font-size:13px;color:#1e293b;margin-bottom:2px}
.co-tag{font-size:10px;color:#94a3b8;margin-bottom:5px}
.co-score{display:flex;align-items:center;gap:7px}
.score-num{font-size:21px;font-weight:800;line-height:1}
.score-grade{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700}
.alert-badge{font-size:10px;background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:999px;font-weight:700}
.sidebar-foot{padding:10px;border-top:1px solid #f1f5f9}
.btn-score-all{width:100%;padding:9px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.btn-score-all:hover{background:#1e293b}
.legend{margin-top:10px;padding:10px 12px;background:#f8fafc;border-radius:8px}
.legend-title{font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.legend-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
/* Main */
main{flex:1;overflow-y:auto;padding:22px;background:#f1f5f9}
.empty-state{height:80%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center}
.empty-icon{font-size:52px;margin-bottom:4px}
.empty-title{font-size:20px;font-weight:800;color:#334155}
.empty-sub{font-size:13px;color:#94a3b8;max-width:360px;line-height:1.7}
.api-warn{margin-top:14px;padding:14px 20px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;font-size:13px;color:#dc2626;max-width:440px;line-height:1.7}
code{font-family:monospace;font-size:12px;display:block;margin-top:6px;background:#fff1f1;padding:4px 8px;border-radius:4px}
/* Cards */
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
/* Tabs */
.tabs{display:flex;gap:3px;background:#fff;padding:4px;border-radius:10px;border:1px solid #e2e8f0;width:fit-content;margin-bottom:18px}
.tab{padding:6px 18px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;text-transform:capitalize;background:transparent;color:#64748b;transition:all .15s}
.tab.active{background:#0f172a;color:#fff}
/* Page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-title{font-size:20px;font-weight:800;color:#0f172a}
.page-sub{font-size:12px;color:#94a3b8;margin-top:2px}
.btn-rescore{padding:7px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;color:#475569;cursor:pointer}
/* Gauge row */
.gauge-row{padding:24px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:28px;align-items:center}
.gauge-meta{margin-left:auto;min-width:150px}
.meta-row{display:flex;justify-content:space-between;gap:16px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.meta-key{color:#94a3b8}.meta-val{font-weight:700;color:#334155}
/* Alerts */
.alerts{margin-bottom:18px}
.alert-header{font-size:11px;font-weight:800;color:#b45309;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.alert-item{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px;line-height:1.5}
.alert-metric{font-weight:700;color:#92400e;margin-right:8px}
.alert-claim{color:#78350f}
.alert-arrow{color:#94a3b8;margin:0 8px}
.alert-counter{color:#dc2626}
.alert-div{background:#fee2e2;color:#991b1b;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-left:10px}
/* Pillar grid */
.pillar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pillar-card{padding:20px}
.pillar-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pillar-label-sm{font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:2px;text-transform:uppercase}
.pillar-name{font-size:17px;font-weight:700;color:#1e293b}
.pillar-score{font-size:30px;font-weight:800;line-height:1}
.pillar-conf{font-size:10px;color:#94a3b8;margin-top:2px}
.gw-warn{background:#fef3c7;border:1px solid #fbbf24;border-radius:6px;padding:6px 10px;font-size:12px;color:#92400e;font-weight:600;margin-bottom:12px}
.bar-legend{display:flex;gap:12px;margin-top:8px;font-size:10px;color:#94a3b8}
.bar-swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
/* Overview grid */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.compliance-card{padding:20px}
.compliance-title{font-size:11px;font-weight:700;color:#475569;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc}
.check-label{font-size:13px;font-weight:600;color:#334155}
.check-desc{font-size:11px;color:#94a3b8;margin-top:1px}
/* Metrics table */
.table-card{padding:20px}
.table-title{font-size:11px;font-weight:700;color:#475569;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 10px;text-align:left;color:#94a3b8;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #f1f5f9;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f8fafc}
.pill{padding:1px 8px;border-radius:999px;font-size:11px;font-weight:700}
.bar-mini{width:48px;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.bar-fill{height:100%;border-radius:3px}
/* Audit */
.audit-card{padding:20px}
.audit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.audit-cell{background:#f8fafc;border-radius:8px;padding:10px 14px}
.audit-key{font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.audit-val{font-weight:700;color:#334155;font-family:monospace;font-size:12px;word-break:break-all}
.audit-notice{padding:12px 14px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;font-size:13px;color:#15803d;line-height:1.6}
/* Radar (SVG) */
.radar-card{padding:20px}
.radar-title{font-size:11px;font-weight:700;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
/* Spinner */
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.loading-icon{font-size:36px}
.loading-text{color:#64748b;font-size:14px}
/* Fade */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ── colours / helpers ──────────────────────────────────────────────────
const PC = {E:'#22c55e',S:'#3b82f6',G:'#8b5cf6'};
const PL = {E:'Environmental',S:'Social',G:'Governance'};
function sc(s){return s>=70?'#22c55e':s>=45?'#f59e0b':'#ef4444'}
function sg(s){return s>=80?'A':s>=65?'B':s>=50?'C':s>=35?'D':'F'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
const API = 'http://localhost:8000/api/v1';

// ── SVG gauge ──────────────────────────────────────────────────────────
function svgGauge(score, label, size=140){
  const r=size*.38, cx=size/2, cy=size*.54;
  const startA=210, endA=-30, range=startA-endA;
  const pct=Math.max(0,Math.min(1,score/100));
  const toRad=d=>d*Math.PI/180;
  function arcPoint(cx,cy,r,deg){return[cx+r*Math.cos(toRad(deg)),cy-r*Math.sin(toRad(deg))]}
  function arc(cx,cy,r,a1,a2,laf){
    const[x1,y1]=arcPoint(cx,cy,r,a1);
    const[x2,y2]=arcPoint(cx,cy,r,a2);
    return`M${x1},${y1} A${r},${r},0,${laf},0,${x2},${y2}`;
  }
  const bgLaf=1, fgLaf=pct>0.5?1:0;
  const fgEnd=startA-pct*range;
  const col=sc(score), grade=sg(score);
  const sw=size*.09;
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <svg width="${size}" height="${size*.72}" viewBox="0 0 ${size} ${size*.72}">
      <path d="${arc(cx,cy,r,endA,startA,1)}" fill="none" stroke="#e2e8f0" stroke-width="${sw}" stroke-linecap="round"/>
      ${pct>0?`<path d="${arc(cx,cy,r,fgEnd,startA,fgLaf)}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`:``}
      <text x="${cx}" y="${cy+2}" text-anchor="middle" font-size="${size*.18}" font-weight="800" fill="#1e293b" font-family="system-ui">${score.toFixed(0)}</text>
      <text x="${cx}" y="${cy+size*.14}" text-anchor="middle" font-size="${size*.085}" font-weight="800" fill="${col}" font-family="system-ui">${grade}</text>
    </svg>
    <span style="font-size:11px;font-weight:600;color:#64748b;text-align:center;line-height:1.3">${esc(label)}</span>
  </div>`;
}

// ── SVG bar chart ──────────────────────────────────────────────────────
function svgBars(data, pillarColor){
  if(!data.length) return '';
  const W=260,barH=14,gap=6,padL=36,padR=12;
  const H=data.length*(barH+gap)+4;
  const barsHTML=data.map((d,i)=>{
    const y=i*(barH+gap)+2;
    const bw=Math.max(2,Math.round((d.score/100)*(W-padL-padR)));
    const col=d.outcome?pillarColor:'#cbd5e1';
    return`<text x="${padL-4}" y="${y+barH*.75}" text-anchor="end" font-size="9" fill="#94a3b8" font-family="system-ui">${esc(d.name)}</text>
      <rect x="${padL}" y="${y}" width="${W-padL-padR}" height="${barH}" rx="3" fill="#f1f5f9"/>
      <rect x="${padL}" y="${y}" width="${bw}" height="${barH}" rx="3" fill="${col}"/>
      <text x="${padL+bw+3}" y="${y+barH*.76}" font-size="9" fill="#64748b" font-family="system-ui">${d.score}</text>`;
  }).join('');
  return`<svg width="${W}" height="${H}" style="overflow:visible">${barsHTML}</svg>`;
}

// ── SVG radar ──────────────────────────────────────────────────────────
function svgRadar(points){
  if(!points.length) return '';
  const cx=140,cy=130,R=100,n=points.length;
  const toRad=d=>d*Math.PI/180;
  function pt(val,i){
    const a=toRad(-90+(360/n)*i);
    const r=(val/100)*R;
    return[cx+r*Math.cos(a),cy+r*Math.sin(a)];
  }
  function axPt(i,scale=1){
    const a=toRad(-90+(360/n)*i);
    return[cx+R*scale*Math.cos(a),cy+R*scale*Math.sin(a)];
  }
  const gridLines=[.25,.5,.75,1].map(s=>
    `<polygon points="${Array.from({length:n},(_,i)=>axPt(i,s).join(',')).join(' ')}" fill="none" stroke="#e2e8f0" stroke-width="1"/>`
  ).join('');
  const axes=Array.from({length:n},(_,i)=>{
    const[x,y]=axPt(i);
    return`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>`;
  }).join('');
  const poly=points.map(({val},i)=>pt(val,i).join(',')).join(' ');
  const labels=points.map(({name},i)=>{
    const[x,y]=axPt(i,1.18);
    return`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#64748b" font-family="system-ui">${esc(name)}</text>`;
  }).join('');
  return`<svg width="280" height="270" viewBox="0 0 280 270">
    ${gridLines}${axes}
    <polygon points="${poly}" fill="#6366f120" stroke="#6366f1" stroke-width="1.5"/>
    ${labels}
  </svg>`;
}

// ── state ──────────────────────────────────────────────────────────────
let state = { selected:null, results:{}, loading:{}, apiOk:null, tab:'overview' };

function setState(patch){ Object.assign(state,patch); render(); }

// ── API calls ──────────────────────────────────────────────────────────
async function checkApi(){
  try{const r=await fetch('http://localhost:8000/health');setState({apiOk:r.ok});}
  catch{setState({apiOk:false});}
}

async function scoreCompany(co){
  setState({loading:{...state.loading,[co.id]:true}, selected:co.id, tab:'overview'});
  try{
    const r=await fetch(`${API}/score`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({company:{id:co.id,name:co.name,jurisdiction:co.jurisdiction,sector:co.sector,is_listed:false},evidence:co.evidence})
    });
    const data=await r.json();
    setState({results:{...state.results,[co.id]:data}});
  }catch(e){console.error(e);}
  setState({loading:{...state.loading,[co.id]:false}});
}

// ── render helpers ─────────────────────────────────────────────────────
function renderSidebar(){
  const cards=COMPANIES.map(co=>{
    const res=state.results[co.id];
    const isSel=state.selected===co.id;
    const isLoad=state.loading[co.id];
    let scoreHtml='<div style="font-size:11px;color:#cbd5e1">Click to score →</div>';
    if(isLoad) scoreHtml=`<div style="font-size:11px;color:#f59e0b;font-weight:600"><span class="spin">⚙</span> Scoring…</div>`;
    else if(res){
      const s=res.score.composite_score, col=sc(s), g=sg(s);
      scoreHtml=`<div class="co-score">
        <span class="score-num" style="color:${col}">${s.toFixed(0)}</span>
        <span class="score-grade" style="background:${col}18;color:${col}">${g}</span>
        ${res.alerts&&res.alerts.length?`<span class="alert-badge">⚠ ${res.alerts.length}</span>`:''}
      </div>`;
    }
    return`<div class="co-card${isSel?' active':''}" data-id="${co.id}">
      <div class="co-name">${esc(co.name)}</div>
      <div class="co-tag">${esc(co.tag)}</div>
      ${scoreHtml}
    </div>`;
  }).join('');

  const dot=state.apiOk===true?'ok':state.apiOk===false?'err':'';
  const apiLabel=state.apiOk===true?'API connected':state.apiOk===false?'API offline':'Connecting…';

  return`
    <header>
      <div style="display:flex;align-items:center">
        <div class="logo-icon">H</div>
        <div class="logo-text">
          <div class="logo-name">Horison ESG</div>
          <div class="logo-sub">Private Markets · Outcome-Based · Auditable</div>
        </div>
      </div>
      <div class="api-status">
        <div class="status-dot ${dot}"></div>
        <span>${apiLabel}</span>
      </div>
    </header>
    <div class="body">
      <aside>
        <div class="sidebar-label">Portfolio</div>
        <div class="company-list">${cards}</div>
        <div class="sidebar-foot">
          <button class="btn-score-all" id="btnScoreAll">Score All Companies</button>
          <div class="legend">
            <div class="legend-title">Score Legend</div>
            ${[['≥80','A','#22c55e'],['65–79','B','#84cc16'],['50–64','C','#f59e0b'],['35–49','D','#f97316'],['<35','F','#ef4444']].map(([r,g,c])=>
              `<div class="legend-row"><span style="color:#64748b">${r}</span><span style="font-weight:800;color:${c}">${g}</span></div>`
            ).join('')}
          </div>
        </div>
      </aside>`;
}

function renderMain(){
  const {selected,results,loading,tab,apiOk}=state;
  if(!selected){
    return`<main>
      <div class="empty-state">
        <div class="empty-icon">🌱</div>
        <div class="empty-title">Select a company to score</div>
        <div class="empty-sub">Outcome-based ESG scoring with full evidence lineage. Every score is traceable — greenwash detection included.</div>
        ${apiOk===false?`<div class="api-warn"><strong>Backend not running.</strong><br>Start it with:<code>cd /Users/ramki/horison-esg<br>python3 -m uvicorn src.api.main:app --reload</code></div>`:''}
      </div>
    </main>`;
  }
  if(loading[selected]&&!results[selected]){
    return`<main><div class="loading-state"><div class="loading-icon spin">⚙</div><div class="loading-text">Computing ESG score…</div></div></main>`;
  }
  const res=results[selected];
  if(!res) return`<main><div class="loading-state"><div class="loading-text">No data yet.</div></div></main>`;

  const {score,alerts=[]}=res;
  const co=COMPANIES.find(c=>c.id===selected);
  const ps=score.pillar_scores;

  // Alerts
  const alertsHtml=alerts.length?`<div class="alerts">
    <div class="alert-header">⚠ Greenwash Alerts Detected</div>
    ${alerts.map(a=>`<div class="alert-item">
      <span class="alert-metric">${esc(a.metric_id)}</span>
      <span class="alert-claim">${esc(a.claim)}</span>
      <span class="alert-arrow">→</span>
      <span class="alert-counter">${esc(a.counter_evidence)}</span>
      <span class="alert-div">${Math.round(a.divergence_score*100)}% divergence</span>
    </div>`).join('')}
  </div>`:'';

  // Tabs
  const tabs=['overview','pillars','metrics','audit'];
  const tabsHtml=`<div class="tabs">${tabs.map(t=>
    `<button class="tab${tab===t?' active':''}" data-tab="${t}">${t}</button>`
  ).join('')}</div>`;

  // ── Overview ────────────────────────────────────────────────────────
  let content='';
  if(tab==='overview'){
    const metaRows=[
      ['Confidence',Math.round(score.confidence*100)+'%'],
      ['Data Coverage',Math.round(score.data_coverage*100)+'%'],
      ['Evidence Items',score.evidence_count],
      ['Greenwash Risk',Math.round(score.greenwash_risk*100)+'%'],
    ].map(([k,v])=>`<div class="meta-row"><span class="meta-key">${k}</span><span class="meta-val">${v}</span></div>`).join('');

    const gauges=Object.entries(ps).map(([k,p])=>svgGauge(p.score,PL[k],110)).join('');

    // radar data
    const radarPts=Object.entries(ps).flatMap(([,p])=>
      p.metric_scores.filter(m=>m.score>0).map(m=>({name:m.metric_id,val:m.score}))
    ).slice(0,10);

    // compliance
    const checks=[
      ['SFDR Art. 8', score.composite_score>=50, 'Meets sustainability promotion threshold'],
      ['SFDR Art. 9', score.composite_score>=70, 'Qualifies as sustainable investment'],
      ['CSRD Scope',  score.data_coverage>=0.6,  'Sufficient data coverage for CSRD'],
      ['Audit Trail', true,                       'Immutable evidence chain available'],
      ['Greenwash Clear', score.greenwash_risk<0.35, 'No material divergence detected'],
    ];

    content=`
      <div class="card gauge-row">
        ${svgGauge(score.composite_score,'ESG Composite',160)}
        <div style="display:flex;gap:20px;flex-wrap:wrap">${gauges}</div>
        <div class="gauge-meta">${metaRows}</div>
      </div>
      <div class="overview-grid">
        <div class="card radar-card">
          <div class="radar-title">Metric Radar</div>
          ${svgRadar(radarPts)}
        </div>
        <div class="card compliance-card">
          <div class="compliance-title">SFDR / CSRD Readiness</div>
          ${checks.map(([label,ok,desc])=>`
            <div class="check-row">
              <span style="font-size:14px;flex-shrink:0;margin-top:1px">${ok?'✅':'⚠️'}</span>
              <div>
                <div class="check-label">${label}</div>
                <div class="check-desc">${desc}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // ── Pillars ─────────────────────────────────────────────────────────
  if(tab==='pillars'){
    content=`<div class="pillar-grid">${Object.entries(ps).map(([pk,p])=>{
      const col=PC[pk];
      const chartData=p.metric_scores.filter(m=>m.score>0).map(m=>({name:m.metric_id,score:Math.round(m.score),outcome:m.outcome_based}));
      return`<div class="card pillar-card">
        <div class="pillar-head">
          <div>
            <div class="pillar-label-sm">${pk}</div>
            <div class="pillar-name">${PL[pk]}</div>
          </div>
          <div style="text-align:right">
            <div class="pillar-score" style="color:${col}">${p.score.toFixed(0)}</div>
            <div class="pillar-conf">conf. ${Math.round(p.confidence*100)}%</div>
          </div>
        </div>
        ${p.greenwash_risk>0.25?`<div class="gw-warn">⚠ Greenwash risk: ${Math.round(p.greenwash_risk*100)}%</div>`:''}
        ${svgBars(chartData,col)}
        <div class="bar-legend">
          <span><span class="bar-swatch" style="background:${col}"></span>Outcome-based</span>
          <span><span class="bar-swatch" style="background:#cbd5e1"></span>Policy/disclosure</span>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  // ── Metrics ──────────────────────────────────────────────────────────
  if(tab==='metrics'){
    const all=Object.entries(ps).flatMap(([pk,p])=>p.metric_scores.map(m=>({...m,pk})));
    content=`<div class="card table-card">
      <div class="table-title">All Metrics Detail</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            ${['Metric','Category','Pillar','Score','Confidence','Coverage','Type'].map(h=>`<th>${h}</th>`).join('')}
          </tr></thead>
          <tbody>${all.map(m=>`<tr>
            <td style="font-weight:600;color:#334155;white-space:nowrap">${m.metric_id}</td>
            <td style="color:#64748b;white-space:nowrap">${m.category}</td>
            <td><span class="pill" style="background:${PC[m.pk]}18;color:${PC[m.pk]}">${m.pk}</span></td>
            <td>
              <div style="display:flex;align-items:center">
                <div class="bar-mini"><div class="bar-fill" style="width:${m.score}%;background:${sc(m.score)}"></div></div>
                <span style="font-weight:700;color:${sc(m.score)}">${m.score.toFixed(0)}</span>
              </div>
            </td>
            <td style="color:#64748b">${Math.round(m.confidence*100)}%</td>
            <td style="color:#64748b">${Math.round(m.data_coverage*100)}%</td>
            <td><span class="pill" style="background:${m.outcome_based?'#f0fdf4':'#f8fafc'};color:${m.outcome_based?'#16a34a':'#94a3b8'}">${m.outcome_based?'Outcome':'Policy'}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }

  // ── Audit ────────────────────────────────────────────────────────────
  if(tab==='audit'){
    const rows=[
      ['Score ID',score.id.slice(0,20)+'…'],
      ['Audit Log ID',(score.audit_log_id||'—').slice?.(0,20)+'…'],
      ['Evidence Items',score.evidence_count],
      ['Scored At',new Date(score.scored_at).toLocaleString()],
      ['Scoring Version',score.scoring_version],
      ['Data Coverage',Math.round(score.data_coverage*100)+'%'],
      ['Confidence',Math.round(score.confidence*100)+'%'],
      ['Greenwash Risk',Math.round(score.greenwash_risk*100)+'%'],
    ];
    content=`<div class="card audit-card">
      <div class="table-title">Audit Lineage</div>
      <div class="audit-grid">${rows.map(([k,v])=>`
        <div class="audit-cell">
          <div class="audit-key">${k}</div>
          <div class="audit-val">${esc(String(v))}</div>
        </div>`).join('')}
      </div>
      <div class="audit-notice">
        ✓ Every score is immutably logged. The append-only ledger physically blocks UPDATE/DELETE —
        full regulator-ready evidence chain from source to composite score.
      </div>
    </div>`;
  }

  return`<main>
    <div class="page-header">
      <div>
        <div class="page-title">${esc(co.name)}</div>
        <div class="page-sub">${esc(co.tag)} · Scored ${new Date(score.scored_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
      </div>
      <button class="btn-rescore" data-rescore="${co.id}">↻ Rescore</button>
    </div>
    ${tabsHtml}
    ${alertsHtml}
    <div class="fade-in">${content}</div>
  </main>`;
}

// ── render ─────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=
    renderSidebar() + renderMain() + '</div>';
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll('.co-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const co=COMPANIES.find(c=>c.id===el.dataset.id);
      if(co) scoreCompany(co);
    });
  });
  const btnAll=document.getElementById('btnScoreAll');
  if(btnAll) btnAll.addEventListener('click',()=>{
    COMPANIES.forEach(co=>{if(!state.results[co.id]&&!state.loading[co.id]) scoreCompany(co);});
  });
  document.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click',()=>setState({tab:el.dataset.tab}));
  });
  document.querySelectorAll('[data-rescore]').forEach(el=>{
    el.addEventListener('click',()=>{
      const co=COMPANIES.find(c=>c.id===el.dataset.rescore);
      if(co) scoreCompany(co);
    });
  });
}

// ── boot ───────────────────────────────────────────────────────────────
render();
checkApi();
</script>
</body>
</html>
